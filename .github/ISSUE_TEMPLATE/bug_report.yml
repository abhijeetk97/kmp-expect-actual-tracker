name: Bug report
description: Something is broken or behaving unexpectedly
labels: ["bug"]
body:

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: What did you expect to see vs. what you actually saw?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open a KMP project with …
        2. Open the Expect/Actual tool window
        3. …
    validations:
      required: true

  - type: input
    id: plugin_version
    attributes:
      label: Plugin version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: ide
    attributes:
      label: IDE and version
      placeholder: "IntelliJ IDEA 2024.3.5 / Android Studio Ladybug 2024.2.1"
    validations:
      required: true

  - type: dropdown
    id: kotlin_mode
    attributes:
      label: Kotlin plugin mode
      description: Settings → Languages & Frameworks → Kotlin → Enable K2 mode
      options:
        - K2 (default since 2025.1)
        - K1 (legacy)
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Help → Show Log in Finder/Explorer, search for `KMP Scanner`, paste relevant lines here.
      render: shell
