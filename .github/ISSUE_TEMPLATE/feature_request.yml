name: Feature request
description: Suggest a new feature or improvement
labels: ["feature"]
body:

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the gap or pain point this would address.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see built?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried, or other approaches that could work?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links, related issues, or anything else useful.
