<!-- Tool window strip icon — 13×13 effective art inside a 16×16 canvas.
     Single-color strokes: IntelliJ recolours these at runtime for light/dark themes.
     Use currentColor so the IDE's icon fill is applied. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Expect node -->
  <circle cx="3" cy="8" r="2.2" fill="none" stroke="currentColor" stroke-width="1.4"/>

  <!-- Stem -->
  <line x1="5.2" y1="8" x2="7.2" y2="8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Splitter -->
  <line x1="7.2" y1="3.5" x2="7.2" y2="12.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Branches -->
  <line x1="7.2" y1="3.5" x2="9.5" y2="3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="7.2" y1="8"   x2="9.5" y2="8"   stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="7.2" y1="12.5" x2="9.5" y2="12.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Platform 1 — covered (filled dot) -->
  <circle cx="11.5" cy="3.5" r="2" fill="currentColor"/>

  <!-- Platform 2 — covered (filled dot) -->
  <circle cx="11.5" cy="8" r="2" fill="currentColor"/>

  <!-- Platform 3 — missing (outline dot) -->
  <circle cx="11.5" cy="12.5" r="2" fill="none" stroke="currentColor" stroke-width="1.3"/>
</svg>
