<!-- Plugin Manager / Marketplace icon — 40×40, dark-theme variant -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- Slightly lighter purple background for dark UIs -->
  <rect width="40" height="40" rx="8" fill="#9B6FFF"/>

  <!-- Expect node (left circle) -->
  <circle cx="10" cy="20" r="4.5" fill="#FFFFFF"/>

  <!-- Stem from expect to splitter -->
  <line x1="14.5" y1="20" x2="19" y2="20" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Vertical splitter bar -->
  <line x1="19" y1="10" x2="19" y2="30" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Branch to platform 1 (top) -->
  <line x1="19" y1="10" x2="23.5" y2="10" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <!-- Branch to platform 2 (middle) -->
  <line x1="19" y1="20" x2="23.5" y2="20" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <!-- Branch to platform 3 (bottom) -->
  <line x1="19" y1="30" x2="23.5" y2="30" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>

  <!-- Platform 1 — covered (solid circle + checkmark) -->
  <circle cx="28" cy="10" r="4.5" fill="#FFFFFF"/>
  <polyline points="25.8,10 27.4,11.7 30.2,8.3" fill="none" stroke="#9B6FFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Platform 2 — covered (solid circle + checkmark) -->
  <circle cx="28" cy="20" r="4.5" fill="#FFFFFF"/>
  <polyline points="25.8,20 27.4,21.7 30.2,18.3" fill="none" stroke="#9B6FFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Platform 3 — missing (outline circle + X) -->
  <circle cx="28" cy="30" r="4.5" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="2.5,1.5"/>
  <line x1="25.8" y1="27.8" x2="30.2" y2="32.2" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="30.2" y1="27.8" x2="25.8" y2="32.2" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round"/>
</svg>
